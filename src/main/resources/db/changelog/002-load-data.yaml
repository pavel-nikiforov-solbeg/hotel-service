databaseChangeLog:
  - changeSet:
      id: 002-load-hotels
      author: hotelservice
      changes:
        - loadData:
            tableName: hotels
            file: db/data/hotels.csv
            columns:
              - column:
                  name: id
                  type: NUMERIC
              - column:
                  name: name
                  type: STRING
              - column:
                  name: description
                  type: STRING
              - column:
                  name: brand
                  type: STRING
              - column:
                  name: house_number
                  type: STRING
              - column:
                  name: street
                  type: STRING
              - column:
                  name: city
                  type: STRING
              - column:
                  name: country
                  type: STRING
              - column:
                  name: post_code
                  type: STRING
              - column:
                  name: phone
                  type: STRING
              - column:
                  name: email
                  type: STRING
              - column:
                  name: arrival_check_in
                  type: STRING
              - column:
                  name: arrival_check_out
                  type: STRING

  - changeSet:
      id: 002-load-amenities
      author: hotelservice
      changes:
        - loadData:
            tableName: hotel_amenities
            file: db/data/hotel_amenities.csv
            columns:
              - column:
                  name: hotel_id
                  type: NUMERIC
              - column:
                  name: amenities
                  type: STRING
  - changeSet:
      id: 003-reset-hotel-id
      author: hotelservice
      changes:
        - sql:
            sql: ALTER TABLE hotels ALTER COLUMN id RESTART WITH 100;