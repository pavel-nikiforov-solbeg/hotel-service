databaseChangeLog:
  - changeSet:
      id: 001-create-hotels
      author: hotelservice
      changes:
        - createTable:
            tableName: hotels
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: house_number
                  type: VARCHAR(20)
              - column:
                  name: street
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(255)
              - column:
                  name: country
                  type: VARCHAR(255)
              - column:
                  name: post_code
                  type: VARCHAR(20)
              - column:
                  name: phone
                  type: VARCHAR(50)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: arrival_check_in
                  type: VARCHAR(10)
              - column:
                  name: arrival_check_out
                  type: VARCHAR(10)

  - changeSet:
      id: 001-create-hotel-amenities
      author: hotelservice
      changes:
        - createTable:
            tableName: hotel_amenities
            columns:
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_amenities_hotel
                    references: hotels(id)
              - column:
                  name: amenities
                  type: VARCHAR(255)
        - addUniqueConstraint:
            tableName: hotel_amenities
            columnNames: hotel_id, amenities
            constraintName: uk_hotel_amenity
